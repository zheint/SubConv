mixed-port: 7890
allow-lan: true
mode: rule
log-level: info
external-controller: :9090
dns:
  enable: true
  listen: 0.0.0.0:1053
  default-nameserver:
  - 223.5.5.5
  - 8.8.8.8
  - 1.1.1.1
  proxy-server-nameserver:
  - https://dns.alidns.com/dns-query
  nameserver-policy:
    geosite:gfw,geolocation-!cn:
    - https://1.1.1.1/dns-query#🚀 节点选择
    - https://1.0.0.1/dns-query#🚀 节点选择
    - https://8.8.8.8/dns-query#🚀 节点选择
  nameserver:
  - https://dns.alidns.com/dns-query
  - https://doh.pub/dns-query
  - https://8.8.8.8/dns-query#🚀 节点选择
  fallback:
  - https://1.1.1.1/dns-query#🚀 节点选择
  - https://1.0.0.1/dns-query#🚀 节点选择
  - https://8.8.8.8/dns-query#🚀 节点选择
  fallback-filter:
    geoip: false
    geoip-code: CN
    ipcidr:
    - 240.0.0.0/4
  fake-ip-filter:
  - +.lan
  - +.microsoft*.com
  - localhost.ptlogin2.qq.com
proxy-providers:
  subscription0:
    type: http
    url: https://ariel.premiumcloud.shop/provider?url=https%3A%2F%2Fapi3.joyjoybb.com%3A2096%2Fsub%2Ftt8k
    interval: 180
    path: ./sub/subscription0.yaml
    health-check:
      enable: true
      interval: 60
      url: https://www.gstatic.com/generate_204
