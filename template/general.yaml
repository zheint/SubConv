# Proxy Groups Configuration
proxy-groups:
  - name: Auto-Best-Ping
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    # IMPORTANT: Keep your original placeholder below (e.g., {{proxies}})
    proxies:
      - {{all_proxies}}

  - name: Proxy
    type: select
    proxies:
      - Auto-Best-Ping
      - DIRECT

# Rules Configuration
rules:
  # --- Myanmar Financial & Local Services ---
  - DOMAIN-KEYWORD,kbzpay,DIRECT
  - DOMAIN-KEYWORD,ayapay,DIRECT
  - DOMAIN-KEYWORD,wavemoney,DIRECT
  - DOMAIN-KEYWORD,cbbank,DIRECT
  - DOMAIN-SUFFIX,mm,DIRECT
  - GEOIP,mm,DIRECT
  - GEOIP,private,DIRECT
  
  # --- Media & Social Direct Rules ---
  - GEOSITE,youtube,DIRECT
  - GEOSITE,tiktok,DIRECT
  - GEOSITE,telegram,DIRECT
  - GEOIP,telegram,DIRECT
  - DOMAIN-SUFFIX,fast.com,DIRECT
  - DOMAIN-KEYWORD,nflxvideo,DIRECT
  - DOMAIN-KEYWORD,netflix,DIRECT

  # --- Default Global Rule ---
  # All other traffic routes through the Auto-Best-Ping group
  - MATCH,Auto-Best-Ping
