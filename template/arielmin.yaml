HEAD:
  mixed-port: 7890
  allow-lan: true
  mode: rule
  log-level: info
  external-controller: :9090
  dns:
    enable: true
    listen: 0.0.0.0:1053
    default-nameserver:
    - 223.5.5.5
    - 8.8.8.8
    - 1.1.1.1
    proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
    fallback:
    - https://1.1.1.1/dns-query
    - https://1.0.0.1/dns-query
TEST_URL: https://www.gstatic.com/generate_204

RULESET:
- - DIRECT
  - https://raw.githubusercontent.com/zheint/subcon/refs/heads/main/ArielMyanmar.list
- - 🐟 漏网之鱼
  - '[]FINAL'

CUSTOM_PROXY_GROUP:
- name: ♻️ 自动选择
  type: url-test
  url: http://www.gstatic.com/generate_204
  interval: 300
  tolerance: 50
  proxies:
    - {{all_proxies}}

- name: 🐟 漏网之鱼
  type: select
  proxies:
    - ♻️ 自动选择
    - DIRECT
